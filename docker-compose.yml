services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Modelli e dati non sono nel repo: vanno presenti su disco per il
      # funzionamento reale di /predict, /mesh e /report.
      - ./outputs:/app/outputs
      - ./data:/app/data

  frontend:
    build:
      context: frontend
      args:
        VITE_API_BASE: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend
